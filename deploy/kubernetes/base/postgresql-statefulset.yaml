# ==============================================================================
# Heretek OpenClaw - PostgreSQL StatefulSet
# ==============================================================================
# Base StatefulSet configuration for PostgreSQL with pgvector
# ==============================================================================

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: openclaw
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: openclaw
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: openclaw
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgresql
          image: pgvector/pgvector:pg17
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: "openclaw"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: "openclaw"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - openclaw
                - -d
                - openclaw
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - openclaw
                - -d
                - openclaw
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: postgresql-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgresql-init
          configMap:
            name: postgresql-init
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
        labels:
          app.kubernetes.io/name: postgresql
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  namespace: openclaw
  labels:
    app.kubernetes.io/name: postgresql
data:
  init-pgvector.sql: |
    -- Enable pgvector extension
    CREATE EXTENSION IF NOT EXISTS vector;
    
    -- Create OpenClaw database schema
    CREATE SCHEMA IF NOT EXISTS openclaw;
    
    -- Grant permissions
    GRANT ALL PRIVILEGES ON SCHEMA openclaw TO openclaw;
    GRANT ALL PRIVILEGES ON DATABASE openclaw TO openclaw;
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: openclaw
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgresql
